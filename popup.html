<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LastTurns</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-badge">LT</div>
      <div class="brand-text">
        <div class="title-row">
          <h1>LastTurns</h1>
          <a
                  class="github-link"
                  href="https://github.com/NaerDD/lastturns-extension"
                  target="_blank"
                  rel="noreferrer"
                  aria-label="GitHub"
                  title="GitHub"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true" width="16" height="16">
              <path
                      fill="currentColor"
                      d="M12 .5C5.65.5.5 5.66.5 12.03c0 5.1 3.3 9.41 7.89 10.94.58.11.79-.25.79-.56v-2.16c-3.21.7-3.89-1.38-3.89-1.38-.52-1.34-1.28-1.7-1.28-1.7-1.05-.73.08-.72.08-.72 1.16.08 1.77 1.2 1.77 1.2 1.03 1.77 2.71 1.26 3.37.96.1-.75.4-1.26.72-1.55-2.56-.29-5.25-1.29-5.25-5.73 0-1.27.45-2.31 1.19-3.13-.12-.29-.52-1.47.11-3.06 0 0 .98-.31 3.2 1.19a10.96 10.96 0 0 1 5.82 0c2.22-1.5 3.2-1.19 3.2-1.19.63 1.59.23 2.77.11 3.06.74.82 1.19 1.86 1.19 3.13 0 4.45-2.69 5.43-5.26 5.72.41.36.78 1.08.78 2.19v3.24c0 .31.21.68.8.56a11.54 11.54 0 0 0 7.88-10.94C23.5 5.66 18.35.5 12 .5Z"
              />
            </svg>
          </a>
        </div>
        <p>Keep only the last few chat turns</p>
      </div>
    </div>
  </header>

  <main class="panel">
    <section class="section compact">
      <div id="platformInfo" class="platform-info">站点：识别中…</div>
    </section>

    <section class="section">
      <label class="field-label" for="keepCount">保留最近</label>
      <div class="inline-field">
        <input id="keepCount" type="number" min="1" step="1" value="5" />
        <span class="unit">轮</span>
      </div>
    </section>

    <section class="section">
      <label class="switch-row" for="autoTrim">
        <div class="switch-copy">
          <span class="switch-title">自动保持</span>
          <span class="switch-desc">页面更新后持续清理旧对话</span>
        </div>
        <input id="autoTrim" type="checkbox" checked />
      </label>
    </section>

    <section class="section actions">
      <button id="btnApply" class="btn btn-primary" type="button">清理历史对话</button>
      <button id="btnGuess" class="btn btn-secondary" type="button">自动识别</button>
    </section>

    <section class="section sub-actions">
      <button id="btnPick" class="text-btn" type="button">手动选择对话框</button>
      <button id="btnClear" class="text-btn danger" type="button">清除站点规则</button>
    </section>

    <section class="section compact">
      <div id="status" class="status" data-type="info">可先自动识别，也可手动选择对话框</div>
    </section>
  </main>
</div>

<script src="popup.js"></script>
</body>
</html>
