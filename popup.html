<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LastTurns</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="app">
      <div class="header">
        <div>
          <h1>LastTurns</h1>
          <p class="site" id="siteInfo">正在读取当前页面…</p>
        </div>
        <span class="badge" id="countBadge">5 轮</span>
      </div>

      <div class="panel">
        <label class="field" for="keepCount">
          <span class="field-label">保留最近</span>
          <div class="field-control">
            <input id="keepCount" type="number" min="1" step="1" value="5" />
            <span class="field-suffix">轮</span>
          </div>
        </label>

        <label class="toggle-row">
          <input id="autoTrim" type="checkbox" checked />
          <span>自动保持</span>
        </label>

        <button id="saveApply" class="primary">清理历史对话</button>

        <div class="mini-actions">
          <button id="trimNow" class="ghost">立即执行</button>
          <button id="autoDetect" class="ghost">重新识别</button>
          <button id="pickTurn" class="ghost ghost-wide">手动选择对话框</button>
          <button id="clearRule" class="ghost danger-text">清除当前站点规则</button>
        </div>
      </div>

      <div class="footer-row">
        <p class="status" id="status">准备就绪</p>
        <a class="repo-link" id="repoLink" href="https://github.com/NaerDD/lastturns-extension" target="_blank" rel="noreferrer" title="GitHub" aria-label="Open GitHub repository">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 .5C5.65.5.5 5.66.5 12.02c0 5.09 3.29 9.41 7.86 10.94.58.1.79-.25.79-.56 0-.27-.01-1.17-.02-2.12-3.2.7-3.88-1.36-3.88-1.36-.52-1.34-1.28-1.69-1.28-1.69-1.05-.72.08-.7.08-.7 1.16.08 1.77 1.2 1.77 1.2 1.03 1.77 2.71 1.26 3.37.97.1-.75.4-1.26.73-1.55-2.56-.29-5.25-1.29-5.25-5.72 0-1.26.45-2.29 1.19-3.1-.12-.29-.52-1.46.11-3.04 0 0 .97-.31 3.19 1.18a10.98 10.98 0 0 1 5.81 0c2.21-1.49 3.18-1.18 3.18-1.18.63 1.58.24 2.75.12 3.04.74.81 1.18 1.84 1.18 3.1 0 4.44-2.7 5.42-5.28 5.71.41.36.78 1.08.78 2.17 0 1.57-.01 2.83-.01 3.21 0 .31.21.67.8.56A11.53 11.53 0 0 0 23.5 12C23.5 5.66 18.35.5 12 .5Z"/></svg>
        </a>
      </div>
      <p class="hint" id="detectedInfo">默认自动识别。若识别不准，再点“手动选择对话框”。</p>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
